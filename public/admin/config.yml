# Sveltia CMS configuration.
# Collections map 1:1 to the Astro Content Collections in src/content.config.ts.
#
# Auth: the GitHub backend needs an OAuth proxy because GitHub does not allow
# browser-only OAuth. Before go-live, deploy the `sveltia/sveltia-cms-auth`
# Cloudflare Worker, register a GitHub OAuth App pointing at it, then uncomment
# and set `base_url` below. Local editing/preview of the UI works without this.
backend:
  name: github
  repo: MathieuBordere/dermatologienazareth.be
  branch: main
  # base_url: https://<your-oauth-worker>.workers.dev

# Repo path where uploads are committed vs. the public URL used on the site.
media_folder: "public/assets/images"
public_folder: "/assets/images"

# Dutch UI for the site owner.
locale: nl

collections:
  - name: treatments
    label: "Behandelingen"
    label_singular: "Behandeling"
    folder: "src/content/treatments"
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    sortable_fields: [order, title]
    fields:
      - { name: title, label: "Titel", widget: string }
      - { name: summary, label: "Samenvatting", widget: text }
      - { name: order, label: "Volgorde", widget: number, value_type: int, default: 0 }
      - { name: featured, label: "Uitgelicht", widget: boolean, default: false }
      - { name: image, label: "Afbeelding", widget: image, required: false }
      - { name: body, label: "Inhoud", widget: markdown }

  - name: team
    label: "Team"
    label_singular: "Teamlid"
    folder: "src/content/team"
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    sortable_fields: [order, name]
    fields:
      - { name: name, label: "Naam", widget: string }
      - { name: role, label: "Functie", widget: string }
      - { name: photo, label: "Foto", widget: image }
      - { name: order, label: "Volgorde", widget: number, value_type: int, default: 0 }
      - { name: body, label: "Bio", widget: markdown }

  - name: settings
    label: "Instellingen"
    files:
      - name: contact
        label: "Contactgegevens"
        file: "src/content/settings/contact.json"
        fields:
          - { name: practiceName, label: "Praktijknaam", widget: string }
          - { name: addressLine, label: "Adres", widget: string }
          - { name: postalCode, label: "Postcode", widget: string }
          - { name: city, label: "Gemeente", widget: string }
          - { name: phone, label: "Telefoon", widget: string }
          - { name: email, label: "E-mail", widget: string }
          - { name: bookingUrl, label: "Afspraak-link (externe agenda)", widget: string }
          - name: openingHours
            label: "Openingsuren"
            label_singular: "Dag"
            widget: list
            fields:
              - { name: day, label: "Dag", widget: string }
              - { name: hours, label: "Uren", widget: string }
